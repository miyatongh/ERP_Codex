openapi: 3.0.3
info:
  title: Sake Warehouse MVP API Draft
  version: 0.1.0
  description: |
    酒問屋問題MVP向けAPI草案。
    Requestの登録 -> 検査 -> 在庫引当 -> 出庫指示発行 -> 実績確定を扱う。
servers:
  - url: https://api.example.local

tags:
  - name: Requests
  - name: Inventory
  - name: Audit

paths:
  /requests:
    post:
      tags: [Requests]
      summary: 出庫依頼を登録する
      operationId: createRequest
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequestInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestView'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: request_no duplicate

  /requests/{requestNo}/validate:
    post:
      tags: [Requests]
      summary: 依頼形式を検査する
      operationId: validateRequest
      parameters:
        - $ref: '#/components/parameters/RequestNo'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Validated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestView'
        '404':
          $ref: '#/components/responses/NotFound'

  /requests/{requestNo}/allocate:
    post:
      tags: [Requests]
      summary: FIFOで在庫引当する
      operationId: allocateRequest
      parameters:
        - $ref: '#/components/parameters/RequestNo'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Allocated (shortage may exist)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllocationResult'
        '409':
          description: Invalid state transition
        '404':
          $ref: '#/components/responses/NotFound'

  /requests/{requestNo}/work-orders:
    post:
      tags: [Requests]
      summary: 出庫指示書を生成する
      operationId: issueWorkOrder
      parameters:
        - $ref: '#/components/parameters/RequestNo'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '201':
          description: Work order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderView'
        '409':
          description: Not allocated

  /requests/{requestNo}/complete:
    post:
      tags: [Requests]
      summary: 倉庫実績を確定し在庫を更新する
      operationId: completeRequest
      parameters:
        - $ref: '#/components/parameters/RequestNo'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteInput'
      responses:
        '200':
          description: Completed or shortage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompletionResult'
        '409':
          description: Not instructed

  /requests/{requestNo}:
    get:
      tags: [Requests]
      summary: 依頼状態を取得する
      operationId: getRequest
      parameters:
        - $ref: '#/components/parameters/RequestNo'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestView'
        '404':
          $ref: '#/components/responses/NotFound'

  /shortages:
    get:
      tags: [Inventory]
      summary: 在庫不足リストを取得する
      operationId: listShortages
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ShortageEntry'

  /containers/empty:
    get:
      tags: [Inventory]
      summary: 空コンテナ一覧を取得する
      operationId: listEmptyContainers
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: string

  /audit/events:
    get:
      tags: [Audit]
      summary: 監査イベントを取得する
      operationId: listAuditEvents
      parameters:
        - in: query
          name: request_no
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEvent'

components:
  parameters:
    RequestNo:
      in: path
      name: requestNo
      required: true
      schema:
        type: string
    IdempotencyKey:
      in: header
      name: X-Idempotency-Key
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    CreateRequestInput:
      type: object
      required: [request_no, requested_at, destination, item_code, qty]
      properties:
        request_no:
          type: string
        requested_at:
          type: string
          format: date-time
        destination:
          type: string
        item_code:
          type: string
        qty:
          type: integer
          minimum: 1

    RequestView:
      type: object
      properties:
        request_no:
          type: string
        state:
          type: string
          enum: [received, validated, allocated, instructed, completed, shortage, cancelled]
        destination:
          type: string
        item_code:
          type: string
        qty:
          type: integer
        shortage_qty:
          type: integer
        updated_at:
          type: string
          format: date-time

    AllocationResult:
      type: object
      properties:
        request_no:
          type: string
        allocated_qty:
          type: integer
        shortage_qty:
          type: integer
        picks:
          type: array
          items:
            $ref: '#/components/schemas/PickLine'

    WorkOrderView:
      type: object
      properties:
        request_no:
          type: string
        destination:
          type: string
        picks:
          type: array
          items:
            $ref: '#/components/schemas/PickLine'
        empty_container_marks:
          type: array
          items:
            type: string

    CompleteInput:
      type: object
      required: [executed_at, executor_id, actual_picks]
      properties:
        executed_at:
          type: string
          format: date-time
        executor_id:
          type: string
        actual_picks:
          type: array
          items:
            $ref: '#/components/schemas/PickLine'

    CompletionResult:
      type: object
      properties:
        request_no:
          type: string
        final_state:
          type: string
          enum: [completed, shortage]
        shortage_qty:
          type: integer
        empty_containers:
          type: array
          items:
            type: string

    PickLine:
      type: object
      required: [container_no, item_code, qty]
      properties:
        container_no:
          type: string
        item_code:
          type: string
        qty:
          type: integer
          minimum: 1

    ShortageEntry:
      type: object
      properties:
        request_no:
          type: string
        destination:
          type: string
        item_code:
          type: string
        shortage_qty:
          type: integer

    AuditEvent:
      type: object
      properties:
        event_id:
          type: string
        occurred_at:
          type: string
          format: date-time
        request_no:
          type: string
        actor:
          type: string
        event_type:
          type: string
        before_state:
          type: string
        after_state:
          type: string
        reason_code:
          type: string

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
